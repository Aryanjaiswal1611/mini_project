<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout – QuickBite</title>
    <meta name="description" content="Complete your order by entering your delivery details.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .payment-option:has(input:checked) {
            border-color: var(--primary);
            background: rgba(255, 107, 53, 0.05)
        }
    </style>
</head>

<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo"><i class="fas fa-fire-alt"></i> QuickBite</a>
            <div class="nav-links" id="navLinks">
                <a href="/"><i class="fas fa-home"></i> Home</a>
                <a href="/menu.html"><i class="fas fa-utensils"></i> Menu</a>
            </div>
            <div class="nav-actions">
                <a href="/cart.html" class="cart-btn" title="My Cart">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge hidden" id="cartBadge">0</span>
                </a>
            </div>
            <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <div class="page-wrapper">
        <div class="page-header">
            <h1><i class="fas fa-clipboard-check"></i> Checkout</h1>
            <p>Just one step away from your delicious meal!</p>
            <div class="breadcrumb">
                <a href="/">Home</a><span>›</span><a href="/cart.html">Cart</a><span>›</span><span>Checkout</span>
            </div>
        </div>

        <section class="checkout-section" style="padding-top:40px;padding-bottom:60px" id="checkoutContent">
            <div style="text-align:center;padding:60px">
                <div class="spinner" style="margin:0 auto 16px"></div>
                <p>Loading…</p>
            </div>
        </section>
    </div>

    <div class="loading-overlay">
        <div class="spinner"></div>
    </div>
    <script src="/js/script.js"></script>
    <script>
        let currentUser = null;

        async function loadCheckout() {
            const meRes = await fetch('/api/me', { headers: getAuthHeaders() });
            currentUser = await meRes.json();
            if (!currentUser.loggedIn) { window.location.href = '/login.html'; return; }

            const cartRes = await fetch('/api/cart', { headers: getAuthHeaders() });
            const cartData = await cartRes.json();
            if (!cartData.success || !cartData.items?.length) { window.location.href = '/cart.html'; return; }

            const { items, total } = cartData;
            const delivery = 30;
            const grandTotal = total + delivery;

            const itemRows = items.map(i => `
        <div class="order-item-row">
            <span>${i.food_name} <span style="color:var(--text-muted)">×${i.quantity}</span></span>
            <span>₹${(i.price * i.quantity).toFixed(2)}</span>
        </div>`).join('');

            const payments = [
                ['cod', 'fa-money-bill-wave', 'Cash on Delivery', 'Pay when your food arrives.'],
                ['upi', 'fa-mobile-alt', 'UPI Payment', 'Pay via any UPI app.'],
                ['card', 'fa-credit-card', 'Credit / Debit Card', 'Secure card payment.']
            ];
            const paymentOptions = payments.map(([val, icon, label, desc]) => `
        <label style="display:flex;align-items:center;gap:16px;padding:14px;border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:all 0.2s" class="payment-option">
            <input type="radio" name="payment_method" value="${val}" ${val === 'cod' ? 'checked' : ''} style="accent-color:var(--primary)" onchange="togglePaymentDetails(this.value)">
            <i class="fas ${icon}" style="color:var(--primary);font-size:1.2rem;width:20px"></i>
            <div><div style="font-weight:600;font-size:0.9rem">${label}</div><div style="font-size:0.78rem;color:var(--text-muted)">${desc}</div></div>
        </label>`).join('');

            const paymentDetailsHTML = `
            <div id="upiDetails" style="display:none; margin-top: 15px;">
                <label class="form-label">UPI ID</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-at"></i>
                    <input type="text" id="upiId" class="form-control" placeholder="user@upi">
                </div>
            </div>
            <div id="cardDetails" style="display:none; margin-top: 15px;">
                <label class="form-label">Card Number</label>
                <div class="input-icon-wrapper" style="margin-bottom: 10px;">
                    <i class="fas fa-credit-card"></i>
                    <input type="text" id="cardNumber" class="form-control" placeholder="XXXX XXXX XXXX XXXX">
                </div>
                <div style="display:flex; gap: 10px;">
                    <div style="flex:1;">
                        <label class="form-label">Expiry (MM/YY)</label>
                        <input type="text" class="form-control" placeholder="MM/YY">
                    </div>
                    <div style="flex:1;">
                        <label class="form-label">CVV</label>
                        <input type="password" class="form-control" placeholder="123">
                    </div>
                </div>
            </div>
            `;
            document.getElementById('checkoutContent').innerHTML = `
        <div id="alertBox" style="display:none;margin-bottom:20px"></div>
        <form id="checkoutForm">
        <div class="checkout-layout">
            <div>
                <div class="checkout-card">
                    <h3><i class="fas fa-map-marker-alt"></i> Delivery Details</h3>
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" name="delivery_name" class="form-control" required
                                   placeholder="Your full name" value="${currentUser.user_name || ''}">
                        </div>
                        <div class="invalid-feedback"><i class="fas fa-exclamation-circle"></i><span>Name is required</span></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-phone"></i>
                            <input type="tel" name="delivery_phone" class="form-control" required placeholder="+91 XXXXX XXXXX">
                        </div>
                        <div class="invalid-feedback"><i class="fas fa-exclamation-circle"></i><span>Phone is required</span></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Delivery Address</label>
                        <textarea name="delivery_address" class="form-control" rows="4" required
                                  placeholder="House No., Street, Area, City, PIN Code" style="resize:vertical"></textarea>
                        <div class="invalid-feedback"><i class="fas fa-exclamation-circle"></i><span>Address is required</span></div>
                    </div>
                </div>
                <div class="checkout-card">
                    <h3><i class="fas fa-credit-card"></i> Payment Method</h3>
                    <div style="display:flex;flex-direction:column;gap:12px">${paymentOptions}</div>
                    ${paymentDetailsHTML}
                </div>
            </div>
            <div>
                <div class="checkout-card" style="position:sticky;top:90px">
                    <h3><i class="fas fa-receipt"></i> Order Summary</h3>
                    ${itemRows}
                    <div class="order-item-row"><span>Subtotal</span><span>₹${total.toFixed(2)}</span></div>
                    <div class="order-item-row"><span>Delivery</span><span>₹${delivery.toFixed(2)}</span></div>
                    <div class="order-item-row" style="font-weight:800;font-size:1.1rem;border-top:2px solid var(--border);margin-top:8px;padding-top:12px;color:var(--primary)">
                        <span>Total</span><span>₹${grandTotal.toFixed(2)}</span>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:24px" id="placeOrderBtn">
                        <i class="fas fa-check-circle"></i> Place Order
                    </button>
                    <a href="/cart.html" class="btn btn-outline btn-block" style="margin-top:12px">
                        <i class="fas fa-arrow-left"></i> Back to Cart
                    </a>
                </div>
            </div>
        </div>
        </form>`;

            document.getElementById('checkoutForm').addEventListener('submit', placeOrder);
        }

        async function placeOrder(e) {
            e.preventDefault();
            const form = e.target;
            const btn = document.getElementById('placeOrderBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Placing order…';

            const body = {
                delivery_name: form.delivery_name.value,
                delivery_phone: form.delivery_phone.value,
                delivery_address: form.delivery_address.value,
                payment_method: form.payment_method.value,
                upiId: document.getElementById('upiId') ? document.getElementById('upiId').value : '',
                cardNumber: document.getElementById('cardNumber') ? document.getElementById('cardNumber').value : ''
            };

            try {
                const res = await fetch('/api/orders/place', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...getAuthHeaders()
                    },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Order placed! Redirecting…', 'success');
                    setTimeout(() => window.location.href = data.redirect, 800);

                } else {
                    const box = document.getElementById('alertBox');
                    box.style.display = 'flex';
                    box.className = 'alert alert-danger';
                    box.innerHTML = `<i class="fas fa-exclamation-circle"></i><div>${data.message}</div>`;
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-check-circle"></i> Place Order';
                }
            } catch {
                showToast('Network error. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Place Order';
            }
        }

        window.togglePaymentDetails = function (val) {
            const upiDetails = document.getElementById('upiDetails');
            const cardDetails = document.getElementById('cardDetails');
            if (upiDetails) upiDetails.style.display = val === 'upi' ? 'block' : 'none';
            if (cardDetails) cardDetails.style.display = val === 'card' ? 'block' : 'none';
        };

        document.addEventListener('DOMContentLoaded', loadCheckout);
    </script>
</body>

</html>
